name: "Sync-Cross-Repo-List" 

on: 
  workflow_dispatch:
    inputs:
      repo_list:
        description: 'Target environment'
        required: true
        default: '["repoA","repoB","repoC"]'   
              
      tgt_repo_suffix: 
        required: true
        description: tgt_repo_suffix
        default: _aws


      src_branch: 
        required: true
        description: src_branch
        default: master

      tgt_branch: 
        required: true
        description: tgt_branch
        default: main_tgt

jobs:
  deploy:
    strategy:
      matrix:
        this_repo: ${{ fromJson(inputs.repo_list) }}

    runs-on: ubuntu-latest

    steps:
      - run: echo "Merging ${{ matrix.this_repo }} @ ${{ inputs.src_branch }} to ${{ matrix.this_repo }}_aws @ ${{ inputs.tgt_branch }}"
        name: Init Step

      - uses: actions/checkout@v4  
        with:
          persist-credentials: false  
          # repository: ${{ github.repository_owner}}/${{ matrix.this_repo }}  # checkout the src repo
          # ref: ${{ inputs.src_branch }}


      - run: |
          mkdir temp_repo_dir
          echo "Current working directory: $(pwd)"
          ls -la  
        name: Create the temp directory for merging the repos

  
      # - uses: aviram2308/my_workflows/actions/sync-repo@master # for action.yml in external repo
      - uses: ./actions/sync-repo-list   # for action.yml in this repo in specific dir
      # - uses: ./   # for action.yml in this repo at root
        name: Calling Sync Action
        with: 
          git_pat: ${{ secrets.GIT_PAT }}  
          src_repo: ${{ matrix.this_repo }}
          src_branch: ${{ inputs.src_branch }}
          tgt_repo: ${{ matrix.this_repo }}_${{ inputs.tgt_repo_suffix }}
          tgt_branch: ${{ inputs.tgt_branch }}
          github_account_name: ${{ github.repository_owner}}


          

    